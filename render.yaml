# Render Blueprint — see .github/workflows/deployment.yml for deploy hooks
services:
  - type: web
    name: isinkwa-sethu
    runtime: static
    rootDir: react
    branch: deployment_push
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: off
    envVars:
      - key: VITE_API_URL
        value: https://isinkwa-sethu-web-kpnm.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: isinkwa-sethu-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    branch: deployment_push
    autoDeployTrigger: off
    envVars:
      - key: CORS_ORIGINS
        value: https://isinkwa-sethu-web.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
