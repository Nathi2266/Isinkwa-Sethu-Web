# yaml-language-server: $schema=https://json.schemastore.org/github-action
name: Render deploy
description: Build the frontend and trigger the Render static site deploy hook

inputs:
  deploy-hook:
    description: Render deploy hook URL (Frontend_Deploy_Hook secret)
    required: true
  api-url:
    description: Production API URL baked into the Vite build
    required: false
    default: https://isinkwa-sethu-web-kpnm.onrender.com
  vite-sentry-dsn:
    description: Optional public Sentry DSN to enable frontend error reporting
    required: false
    default: ''
  vite-sentry-environment:
    description: Sentry environment for frontend
    required: false
    default: production
  vite-sentry-release:
    description: Optional release string to bake into the build (recommended: isinkwa_sethu@${{ github.sha }})
    required: false
    default: ''
  sentry-auth-token:
    description: Optional Sentry auth token for sourcemap upload
    required: false
    default: ''
  sentry-org:
    description: Optional Sentry org slug for sourcemap upload
    required: false
    default: ''
  sentry-project:
    description: Optional Sentry project slug for sourcemap upload
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout deployment_push branch
      uses: actions/checkout@v4
      with:
        ref: deployment_push
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: react/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: react
      run: npm ci

    - name: Build for production
      shell: bash
      working-directory: react
      env:
        VITE_API_URL: ${{ inputs.api-url }}
        VITE_SENTRY_DSN: ${{ inputs.vite-sentry-dsn }}
        VITE_SENTRY_ENVIRONMENT: ${{ inputs.vite-sentry-environment }}
        VITE_SENTRY_RELEASE: ${{ inputs.vite-sentry-release }}
        SENTRY_AUTH_TOKEN: ${{ inputs.sentry-auth-token }}
        SENTRY_ORG: ${{ inputs.sentry-org }}
        SENTRY_PROJECT: ${{ inputs.sentry-project }}
      run: npm run build

    - name: Trigger Render frontend deploy hook and wait
      shell: bash
      env:
        FRONTEND_DEPLOY_HOOK: ${{ inputs.deploy-hook }}
      run: |
        set -euo pipefail
        if [ -z "${FRONTEND_DEPLOY_HOOK:-}" ]; then
          echo "::error::Frontend_Deploy_Hook secret is not set."
          exit 1
        fi
        echo "Triggering Render frontend deploy hook…"
        curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK"
        echo "Waiting 120s for Render deploy to finish…"
        sleep 120

    - name: Build summary
      if: always()
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
      run: |
        {
          echo "### Render frontend deployment"
          echo ""
          echo "| Step | Status |"
          echo "|---|---|"
          echo "| Build | completed |"
          echo "| Deploy hook | triggered |"
          echo "| Site URL | \`https://isinkwa-sethu-web.onrender.com\` |"
          echo "| API URL (build) | \`${API_URL}\` |"
        } >> "$GITHUB_STEP_SUMMARY"
