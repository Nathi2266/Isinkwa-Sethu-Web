# yaml-language-server: $schema=https://json.schemastore.org/github-action
name: Render deploy
description: Build the frontend and trigger the Render static site deploy hook

inputs:
  deploy-hook:
    description: Render deploy hook URL (Frontend_Deploy_Hook secret)
    required: true
  api-url:
    description: Production API URL baked into the Vite build
    required: false
    default: https://isinkwa-sethu-web-kpnm.onrender.com

runs:
  using: composite
  steps:
    - name: Checkout deployment_push branch
      uses: actions/checkout@v4
      with:
        ref: deployment_push
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: react/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: react
      run: npm ci

    - name: Build for production
      shell: bash
      working-directory: react
      env:
        VITE_API_URL: ${{ inputs.api-url }}
        VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        VITE_SENTRY_ENVIRONMENT: production
        VITE_SENTRY_RELEASE: isinkwa_sethu@${{ github.sha }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      run: npm run build

    - name: Trigger Render frontend deploy hook and wait
      shell: bash
      env:
        FRONTEND_DEPLOY_HOOK: ${{ inputs.deploy-hook }}
      run: |
        set -euo pipefail
        if [ -z "${FRONTEND_DEPLOY_HOOK:-}" ]; then
          echo "::error::Frontend_Deploy_Hook secret is not set."
          exit 1
        fi
        echo "Triggering Render frontend deploy hook…"
        curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK"
        echo "Waiting 120s for Render deploy to finish…"
        sleep 120

    - name: Build summary
      if: always()
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
      run: |
        {
          echo "### Render frontend deployment"
          echo ""
          echo "| Step | Status |"
          echo "|---|---|"
          echo "| Build | completed |"
          echo "| Deploy hook | triggered |"
          echo "| Site URL | \`https://isinkwa-sethu-web.onrender.com\` |"
          echo "| API URL (build) | \`${API_URL}\` |"
        } >> "$GITHUB_STEP_SUMMARY"
