name: Render deploy
description: Build the frontend and trigger the Render deploy hook

inputs:
  deploy-hook:
    description: Render deploy hook URL (Frontend_Deploy_Hook secret)
    required: true

runs:
  using: composite
  steps:
    - name: Checkout deployment_push branch
      uses: actions/checkout@v4
      with:
        ref: deployment_push
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: frontend
      run: npm ci

    - name: Build
      shell: bash
      working-directory: frontend
      run: npm run build

    - name: Trigger Render deploy hook and wait
      id: deploy_wait
      shell: bash
      env:
        FRONTEND_DEPLOY_HOOK: ${{ inputs.deploy-hook }}
      run: |
        set -euo pipefail
        if [ -z "${FRONTEND_DEPLOY_HOOK:-}" ]; then
          echo "::error::Frontend_Deploy_Hook secret is not set."
          exit 1
        fi
        echo "Triggering Render deploy hook…"
        curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK"
        echo "Waiting 120s for Render deploy to finish…"
        sleep 120

    - name: Build summary
      if: always()
      shell: bash
      run: |
        {
          echo "### Render deployment"
          echo ""
          echo "| Step | Status |"
          echo "|---|---|"
          echo "| Build | completed |"
          echo "| Deploy hook | triggered |"
        } >> "$GITHUB_STEP_SUMMARY"
