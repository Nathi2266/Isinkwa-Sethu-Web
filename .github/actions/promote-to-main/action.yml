name: Promote to main
description: Open or merge a PR from deployment_push into main

runs:
  using: composite
  steps:
    - name: Checkout deployment_push branch
      uses: actions/checkout@v4
      with:
        ref: deployment_push
        fetch-depth: 0
        token: ${{ github.token }}

    - name: Open or reuse PR, squash-merge into main
      id: promote
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SOURCE_BRANCH: deployment_push
        TARGET_BRANCH: main
      run: |
        set -euo pipefail

        wait_for_mergeable() {
          local pr="$1"
          local mergeable=""
          for _ in $(seq 1 60); do
            mergeable=$(gh pr view "$pr" -R "${{ github.repository }}" --json mergeable,state --jq '
              if .state == "MERGED" then "ALREADY_MERGED"
              else .mergeable end')
            case "$mergeable" in
              ALREADY_MERGED)
                echo "PR #${pr} is already merged into main."
                return 0
                ;;
              MERGEABLE)
                echo "PR #${pr} is mergeable."
                return 0
                ;;
              CONFLICTING)
                echo "PR #${pr} has merge conflicts with main."
                return 2
                ;;
              *)
                echo "mergeable=${mergeable:-UNKNOWN}; waiting…"
                sleep 2
                ;;
            esac
          done
          echo "::error::PR #${pr} never became mergeable."
          return 1
        }

        resolve_conflicts_on_source() {
          echo "Merging origin/${TARGET_BRANCH} into ${SOURCE_BRANCH} and keeping deployment layout…"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${TARGET_BRANCH}" "${SOURCE_BRANCH}"
          git checkout "${SOURCE_BRANCH}"

          if git merge "origin/${TARGET_BRANCH}" --no-edit; then
            echo "Clean merge of ${TARGET_BRANCH} into ${SOURCE_BRANCH}."
          else
            if ! git diff --name-only --diff-filter=U | grep -q .; then
              echo "::error::git merge failed but no unmerged paths were found."
              git merge --abort 2>/dev/null || true
              return 1
            fi
            echo "Resolving conflicts by keeping ${SOURCE_BRANCH} (deployed) versions…"
            git checkout --ours .
            git add -A
            if git ls-files | grep -q '^frontend/'; then
              git rm -rf frontend 2>/dev/null || true
            fi
            if git ls-files | grep -q '^node_modules/'; then
              git rm -rf node_modules 2>/dev/null || true
            fi
            git add -A
            git commit -m "chore(ci): resolve promote-to-main conflicts (keep ${SOURCE_BRANCH})"
          fi

          git push origin "HEAD:${SOURCE_BRANCH}"
          echo "Pushed updated ${SOURCE_BRANCH} for PR reconciliation."
        }

        merge_pr() {
          local pr="$1"
          if gh pr view "$pr" -R "${{ github.repository }}" --json state --jq -e '.state == "MERGED"' >/dev/null; then
            return 0
          fi
          if gh pr merge "$pr" -R "${{ github.repository }}" --squash --delete-branch=false; then
            echo "Squash-merged PR #${pr} into main."
            return 0
          fi
          if gh pr merge "$pr" -R "${{ github.repository }}" --merge --delete-branch=false; then
            echo "Merge-committed PR #${pr} into main."
            return 0
          fi
          echo "::error::Could not merge PR #${pr} into main."
          return 1
        }

        git fetch origin "${TARGET_BRANCH}" "${SOURCE_BRANCH}"
        AHEAD=$(git rev-list --count "origin/${TARGET_BRANCH}..origin/${SOURCE_BRANCH}" || true)
        if [ "${AHEAD:-0}" -eq 0 ]; then
          echo "deployment_push has no commits ahead of main — nothing to promote."
          echo "promoted=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "deployment_push is ${AHEAD} commit(s) ahead of main."

        PR_NUMBER=$(gh pr list \
          -R "${{ github.repository }}" \
          --base "${TARGET_BRANCH}" \
          --head "${SOURCE_BRANCH}" \
          --state open \
          --json number \
          --jq '.[0].number // empty')
        if [ -z "$PR_NUMBER" ]; then
          gh pr create \
            -R "${{ github.repository }}" \
            --base "${TARGET_BRANCH}" \
            --head "${SOURCE_BRANCH}" \
            --title "Promote deployment_push → main (post-deploy)" \
            --body "Automated PR after successful Render deploy. Squash-merged by Actions when mergeable."
          PR_NUMBER=$(gh pr list \
            -R "${{ github.repository }}" \
            --base "${TARGET_BRANCH}" \
            --head "${SOURCE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
        fi
        if [ -z "$PR_NUMBER" ]; then
          echo "::error::Could not open PR ${SOURCE_BRANCH} → ${TARGET_BRANCH}."
          exit 1
        fi
        echo "Using PR #${PR_NUMBER}."

        set +e
        wait_for_mergeable "$PR_NUMBER"
        WAIT_STATUS=$?
        set -e
        if [ "$WAIT_STATUS" -eq 2 ]; then
          resolve_conflicts_on_source
          wait_for_mergeable "$PR_NUMBER"
        elif [ "$WAIT_STATUS" -ne 0 ]; then
          exit "$WAIT_STATUS"
        fi

        merge_pr "$PR_NUMBER"
        echo "promoted=true" >> "$GITHUB_OUTPUT"
        echo "promoted_pr=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

    - name: Promotion summary
      if: always()
      shell: bash
      run: |
        {
          echo "### Promote to main"
          echo ""
          echo "| Field | Value |"
          echo "|---|---|"
          echo "| Source | \`deployment_push\` |"
          echo "| Target | \`main\` |"
          echo "| Promoted | ${{ steps.promote.outputs.promoted || 'n/a' }} |"
          echo "| PR | ${{ steps.promote.outputs.promoted_pr || 'n/a' }} |"
          echo ""
          echo "Pushing to \`main\` triggers the CI workflow."
        } >> "$GITHUB_STEP_SUMMARY"
