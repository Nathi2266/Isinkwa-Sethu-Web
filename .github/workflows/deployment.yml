name: Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - deployment_push

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deployment-pipeline
  cancel-in-progress: false

env:
  PRODUCTION_API_URL: https://isinkwa-sethu-web-kpnm.onrender.com
  PRODUCTION_SITE_URL: https://isinkwa-sethu-web.onrender.com

jobs:
  build_and_deploy:
    name: Build and deploy to Render
    runs-on: ubuntu-latest
    env:
      # Map repository secrets to job env (avoids IDE context warnings on composite inputs)
      FRONTEND_DEPLOY_HOOK: ${{ secrets.Frontend_Deploy_Hook }}
      BACKEND_DEPLOY_HOOK: ${{ secrets.Backend_Deploy_Hook }}
    steps:
      - name: Checkout repository (required for local actions)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and deploy frontend
        uses: ./.github/actions/render-deploy
        with:
          deploy-hook: ${{ env.FRONTEND_DEPLOY_HOOK }}
          api-url: ${{ env.PRODUCTION_API_URL }}
          vite-sentry-dsn: ${{ secrets.VITE_SENTRY_DSN }}
          vite-sentry-environment: production
          vite-sentry-release: isinkwa_sethu@${{ github.sha }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          sentry-org: ${{ secrets.SENTRY_ORG }}
          sentry-project: ${{ secrets.SENTRY_PROJECT }}

      - name: Deploy backend (Docker)
        if: ${{ env.BACKEND_DEPLOY_HOOK != '' }}
        uses: ./.github/actions/render-backend-deploy
        with:
          deploy-hook: ${{ env.BACKEND_DEPLOY_HOOK }}

      - name: Backend deploy hook not configured
        if: ${{ env.BACKEND_DEPLOY_HOOK == '' }}
        run: |
          echo "::warning::Backend_Deploy_Hook secret is not set — skipping backend deploy hook."
          echo "Add it under Settings → Secrets and variables → Actions."

  promote_to_main:
    name: Promote deployment_push to main
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Checkout repository (required for local actions)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote to main
        uses: ./.github/actions/promote-to-main
