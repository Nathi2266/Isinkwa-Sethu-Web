name: Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - deployment_push

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deployment-pipeline
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and deploy to Render
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    outputs:
      deploy_succeeded: ${{ steps.deploy_wait.outputs.deploy_succeeded }}

    steps:
      - name: Checkout deployment_push branch
        uses: actions/checkout@v4
        with:
          ref: deployment_push
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Trigger Render deploy hook and wait
        id: deploy_wait
        env:
          FRONTEND_DEPLOY_HOOK: ${{ secrets.Frontend_Deploy_Hook }}
        run: |
          set -euo pipefail
          if [ -z "${FRONTEND_DEPLOY_HOOK:-}" ]; then
            echo "::error::Frontend_Deploy_Hook secret is not set."
            exit 1
          fi
          echo "Triggering Render deploy hook…"
          curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK"
          echo "Waiting 120s for Render deploy to finish…"
          sleep 120
          echo "deploy_succeeded=true" >> "$GITHUB_OUTPUT"

      - name: Build summary
        if: always()
        run: |
          {
            echo "### Render deployment"
            echo ""
            echo "| Step | Status |"
            echo "|---|---|"
            echo "| Build | completed |"
            echo "| Deploy hook | triggered |"
            echo "| Deploy wait | ${{ steps.deploy_wait.outputs.deploy_succeeded }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  promote_to_main:
    name: Promote deployment_push to main
    runs-on: ubuntu-latest
    needs: build_and_deploy
    if: needs.build_and_deploy.outputs.deploy_succeeded == 'true'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SOURCE_BRANCH: deployment_push
      TARGET_BRANCH: main

    steps:
      - name: Checkout deployment_push branch
        uses: actions/checkout@v4
        with:
          ref: deployment_push
          fetch-depth: 0

      - name: Open or reuse PR, squash-merge into main
        id: promote
        run: |
          set -euo pipefail
          wait_for_mergeable() {
            local pr="$1"
            local mergeable=""
            for _ in $(seq 1 60); do
              mergeable=$(gh pr view "$pr" -R "${{ github.repository }}" --json mergeable,state --jq '
                if .state == "MERGED" then "ALREADY_MERGED"
                else .mergeable end')
              case "$mergeable" in
                ALREADY_MERGED)
                  echo "PR #${pr} is already merged into main."
                  return 0
                  ;;
                MERGEABLE)
                  echo "PR #${pr} is mergeable."
                  return 0
                  ;;
                CONFLICTING)
                  echo "::error::PR #${pr} has merge conflicts with main."
                  return 1
                  ;;
                *)
                  echo "mergeable=${mergeable:-UNKNOWN}; waiting…"
                  sleep 2
                  ;;
              esac
            done
            echo "::error::PR #${pr} never became mergeable."
            return 1
          }
          merge_pr() {
            local pr="$1"
            if gh pr view "$pr" -R "${{ github.repository }}" --json state --jq -e '.state == "MERGED"' >/dev/null; then
              return 0
            fi
            if gh pr merge "$pr" -R "${{ github.repository }}" --squash --delete-branch=false; then
              echo "Squash-merged PR #${pr} into main."
              return 0
            fi
            if gh pr merge "$pr" -R "${{ github.repository }}" --merge --delete-branch=false; then
              echo "Merge-committed PR #${pr} into main."
              return 0
            fi
            echo "::error::Could not merge PR #${pr} into main."
            return 1
          }

          git fetch origin "${TARGET_BRANCH}" "${SOURCE_BRANCH}"
          AHEAD=$(git rev-list --count "origin/${TARGET_BRANCH}..origin/${SOURCE_BRANCH}" || true)
          if [ "${AHEAD:-0}" -eq 0 ]; then
            echo "deployment_push has no commits ahead of main — nothing to promote."
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deployment_push is ${AHEAD} commit(s) ahead of main."

          PR_NUMBER=$(gh pr list \
            -R "${{ github.repository }}" \
            --base "${TARGET_BRANCH}" \
            --head "${SOURCE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              -R "${{ github.repository }}" \
              --base "${TARGET_BRANCH}" \
              --head "${SOURCE_BRANCH}" \
              --title "Promote deployment_push → main (post-deploy)" \
              --body "Automated PR after successful Render deploy. Squash-merged by Actions when mergeable."
            PR_NUMBER=$(gh pr list \
              -R "${{ github.repository }}" \
              --base "${TARGET_BRANCH}" \
              --head "${SOURCE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number // empty')
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Could not open PR ${SOURCE_BRANCH} → ${TARGET_BRANCH}."
            exit 1
          fi
          echo "Using PR #${PR_NUMBER}."
          wait_for_mergeable "$PR_NUMBER"
          merge_pr "$PR_NUMBER"
          echo "promoted=true" >> "$GITHUB_OUTPUT"
          echo "promoted_pr=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Promotion summary
        if: always()
        run: |
          {
            echo "### Promote to main"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Source | \`deployment_push\` |"
            echo "| Target | \`main\` |"
            echo "| Promoted | ${{ steps.promote.outputs.promoted || 'n/a' }} |"
            echo "| PR | ${{ steps.promote.outputs.promoted_pr || 'n/a' }} |"
            echo ""
            echo "Pushing to \`main\` triggers the CI workflow."
          } >> "$GITHUB_STEP_SUMMARY"
