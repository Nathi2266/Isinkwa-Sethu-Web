name: Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - deployment_push

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deployment-pipeline
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and deploy to Render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (required for local actions)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and deploy
        uses: ./.github/actions/render-deploy
        with:
          deploy-hook: ${{ secrets.Frontend_Deploy_Hook }}

  promote_to_main:
    name: Promote deployment_push to main
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Checkout repository (required for local actions)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote to main
        uses: ./.github/actions/promote-to-main
