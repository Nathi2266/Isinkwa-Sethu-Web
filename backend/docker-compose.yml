services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: isinkwa
      POSTGRES_PASSWORD: isinkwa
      POSTGRES_DB: isinkwa_sethu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isinkwa -d isinkwa_sethu"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://isinkwa:isinkwa@db:5432/isinkwa_sethu
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
